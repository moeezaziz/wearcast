<!doctype html>
<html><head><meta charset="utf-8"><title>WearCast catalog contact sheet</title>
<style>
  body{margin:0;padding:24px;background:#1a1d23;color:#fff;font:14px/1.4 -apple-system,Segoe UI,sans-serif}
  h1{margin:0 0 6px;font-size:20px}
  h2{margin:32px 0 12px;font-size:15px;color:#aab;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .cell{background:#252830;border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px}
  .cell img{width:100%;aspect-ratio:1/1;border-radius:6px;background:#fff;object-fit:contain}
  .cell .meta{font-size:11px;color:#aab;line-height:1.3}
  .cell .name{font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legend{font-size:13px;color:#9ba;margin-bottom:6px}
</style>
</head><body>
<h1>WearCast catalog — generated SVG illustrations</h1>
<p class="legend">Sample below; full catalog has 508 entries (191 photos + 317 generated SVGs).</p>
<div id="root"></div>
<script>
const ASSETS = "../../www/assets/recommendation-stock/";
const SAMPLES = {
  Tops: ["top-black-blouse-silk-fem","top-cream-blouse-silk-fem","top-navy-button-up-shirt-cotton","top-charcoal-knit-sweater-wool","top-burgundy-polo-shirt-cotton","top-olive-hoodie-cotton"],
  Dresses: ["top-black-wrap-dress-jersey-fem","top-red-bodycon-dress-jersey-fem","top-cream-midi-dress-cotton-fem","top-navy-sheath-dress-wool-fem","top-floral-sundress-cotton-fem"],
  Bottoms: ["bottom-black-pencil-skirt-wool-fem","bottom-blue-mini-skirt-denim-fem","bottom-cream-pleated-skirt-cotton-fem","bottom-black-jeans-denim","bottom-beige-chinos-cotton","bottom-olive-cargo-pants-cotton"],
  Outer: ["outer-camel-trench-coat-wool","outer-black-blazer-wool","outer-navy-overcoat-wool","outer-olive-bomber-jacket-cotton","outer-cream-cardigan-wool","outer-brown-leather-jacket-leather"],
  Shoes: ["shoes-black-loafer-leather","shoes-nude-stiletto-heels-leather-fem","shoes-tan-ballet-flats-leather-fem","shoes-brown-chelsea-boots-leather","shoes-black-knee-high-boots-leather-fem","shoes-black-pumps-leather-fem"],
  Accessories: ["accessory-tan-fedora-wool","accessory-gold-pearl-earrings-pearl-fem","accessory-black-clutch-leather-fem","accessory-navy-tie-silk","accessory-red-beret-wool-fem","accessory-black-belt-leather"],
};
const root = document.getElementById("root");
for (const [section, items] of Object.entries(SAMPLES)) {
  const h = document.createElement("h2"); h.textContent = section; root.appendChild(h);
  const grid = document.createElement("div"); grid.className = "grid"; root.appendChild(grid);
  for (const slug of items) {
    const cell = document.createElement("div"); cell.className = "cell";
    const img = document.createElement("img");
    img.src = ASSETS + slug + ".svg";
    img.onerror = () => { img.src = ASSETS + slug + ".jpg"; img.onerror = () => { img.style.background = "#3a2030"; img.alt = "(missing)"; }; };
    img.alt = slug;
    const name = document.createElement("div"); name.className = "name"; name.textContent = slug.split("-").slice(1).join(" ");
    const meta = document.createElement("div"); meta.className = "meta"; meta.textContent = slug.split("-")[0];
    cell.appendChild(img); cell.appendChild(name); cell.appendChild(meta);
    grid.appendChild(cell);
  }
}
</script>
</body></html>
