<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WearCast Collage Preview</title>
  <link rel="stylesheet" href="../www/styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background:
        radial-gradient(circle at 14% 2%, rgba(255, 212, 122, .34), transparent 26%),
        linear-gradient(180deg, #eef5ff 0%, #f7fbff 34%, #edf7ff 100%);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #14233e;
      padding: 16px 0 40px;
    }

    .phone {
      width: 393px;
      min-height: 852px;
      border-radius: 38px;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    .phone-content {
      padding: 14px 14px 26px;
    }

    .preview-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .preview-kicker {
      color: #2f7df6;
      font-size: 11px;
      letter-spacing: .18em;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .preview-title {
      margin: 0;
      font-size: 28px;
      line-height: .96;
      letter-spacing: -.05em;
      max-width: 250px;
    }

    .preview-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(18, 50, 94, .16);
      border: 2px solid rgba(255,255,255,.85);
    }

    .preview-search {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .preview-searchbar,
    .preview-search-btn {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.88);
      box-shadow: 0 14px 28px rgba(18,50,94,.08);
    }

    .preview-searchbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      color: #6f82a5;
      font-size: 16px;
    }

    .preview-search-btn {
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2d87ff, #00d7b8);
      color: white;
      font-size: 20px;
      font-weight: 700;
    }

    .today-rec-card {
      display: block !important;
    }

    .today-rec-card-inline {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-content">
      <div class="preview-top">
        <div>
          <div class="preview-kicker">Today</div>
          <h1 class="preview-title">Dress with the weather, not against it.</h1>
        </div>
        <div class="preview-avatar" style="display:grid;place-items:center;background:linear-gradient(135deg,#ffffff,#d9e8ff);color:#3a6ec6;font-weight:800;">M</div>
      </div>

      <div class="preview-search">
        <div class="preview-searchbar">
          <span>Berlin, Mitte</span>
          <span>⌕</span>
        </div>
        <div class="preview-search-btn">◎</div>
      </div>

      <div id="aiRecSection" class="today-rec-card today-rec-card-inline">
        <div class="card-header today-rec-header">
          <div>
            <h2>Today's Recommendation</h2>
          </div>
          <span id="aiRecBadge" class="pill pill-soft">Layered</span>
        </div>
        <div id="aiRecContent" class="today-rec-content"></div>
      </div>
    </div>
  </div>

  <script>
    const strip = `
      <div class="today-rec-weather-strip" aria-label="Current weather summary">
        <span class="today-rec-weather-condition">Cloudy</span>
        <div class="today-rec-weather-metrics">
          <span class="today-rec-weather-metric"><small>Now</small>11°C</span>
          <span class="today-rec-weather-metric"><small>Feels</small>8°C</span>
          <span class="today-rec-weather-metric"><small>Wind</small>18 km/h</span>
          <span class="today-rec-weather-metric"><small>Rain</small>42%</span>
        </div>
      </div>
    `;

    const hint = `
      <div class="today-rec-deck-hint" aria-hidden="true">
        <span>Tap any piece to inspect it</span>
        <strong>5 pieces</strong>
      </div>
    `;

    const collage = `
      <div class="today-rec-collage-wrap">
        <div class="today-rec-collage" aria-label="Recommended outfit collage">
          <div class="today-rec-collage-silhouette" aria-hidden="true"></div>

          <button type="button" class="today-rec-collage-item today-rec-collage-item-outer is-outer">
            <span class="today-rec-collage-photo-wrap">
              <img class="today-rec-collage-photo" src="../www/assets/recommendation-stock/outer-gray-jacket-studio.jpg" alt="" />
            </span>
            <span class="today-rec-collage-chip">Outer</span>
            <span class="today-rec-collage-name">Sherpa Fleece Jacket</span>
          </button>

          <button type="button" class="today-rec-collage-item today-rec-collage-item-top is-top">
            <span class="today-rec-collage-photo-wrap">
              <img class="today-rec-collage-photo" src="../www/assets/recommendation-stock/top-knit-sweater-hanger.jpg" alt="" />
            </span>
            <span class="today-rec-collage-chip">Top</span>
            <span class="today-rec-collage-name">Knit Sweater</span>
          </button>

          <button type="button" class="today-rec-collage-item today-rec-collage-item-bottom is-bottom">
            <span class="today-rec-collage-photo-wrap">
              <img class="today-rec-collage-photo" src="../www/assets/recommendation-stock/bottom-blue-jeans-stack.jpg" alt="" />
            </span>
            <span class="today-rec-collage-chip">Bottom</span>
            <span class="today-rec-collage-name">Blue Jeans</span>
          </button>

          <button type="button" class="today-rec-collage-item today-rec-collage-item-shoes is-shoes">
            <span class="today-rec-collage-photo-wrap">
              <img class="today-rec-collage-photo" src="../www/assets/recommendation-stock/shoes-white-sneakers-minimal.jpg" alt="" />
            </span>
            <span class="today-rec-collage-chip">Shoes</span>
            <span class="today-rec-collage-name">White Sneakers</span>
          </button>

          <button type="button" class="today-rec-collage-item today-rec-collage-item-accessory is-accessory-left">
            <span class="today-rec-collage-photo-wrap">
              <img class="today-rec-collage-photo" src="../www/assets/recommendation-stock/accessory-white-beanie-studio.jpg" alt="" />
            </span>
            <span class="today-rec-collage-chip">Accessory</span>
            <span class="today-rec-collage-name">Ribbed Beanie</span>
          </button>
        </div>
      </div>
    `;

    document.getElementById("aiRecContent").innerHTML = `
      <div class="today-rec-body">
        <div class="today-rec-hero">
          <div class="today-rec-outfit">
            <div class="today-rec-icon" aria-hidden="true">👕</div>
            <div class="today-rec-copy">
              <h3>Layered city look</h3>
              <p>Cloudy now with a breezier, slightly wetter finish later, so light layers make the day easier.</p>
            </div>
          </div>
          ${strip}
        </div>
        ${hint}
        ${collage}
      </div>
    `;
  </script>
</body>
</html>
